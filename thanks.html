<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Thank you</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: #222;
      padding: 40px;
      border-radius: 20px;
      max-width: 700px;
      box-shadow: 0 0 24px rgba(0,0,0,0.3);
    }

    h1 {
      margin-top: 0;
      font-size: 36px;
    }

    p {
      font-size: 20px;
      color: #ddd;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Thank you, Cutie ❤️</h1>
    <p>I love you too.</p>
  </div>
</body>
</html>
